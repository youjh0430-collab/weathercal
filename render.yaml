services:
  - type: web
    name: weathercal
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KMA_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://weathercal.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: RENDER
        value: "true"
