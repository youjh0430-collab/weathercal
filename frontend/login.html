<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherCal — 로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard Variable', sans-serif;
            background: #f2f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            text-align: center;
            padding: 40px;
        }
        .login-icon {
            font-size: 4rem;
            margin-bottom: 8px;
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4a90d9;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 40px;
        }
        .login-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 320px;
            margin: 0 auto;
        }
        .login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.1s;
        }
        .login-btn:hover { transform: scale(1.02); }
        .login-btn:active { transform: scale(0.98); }
        .btn-google {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-kakao {
            background: #FEE500;
            color: #191919;
        }
        .btn-icon {
            width: 20px;
            height: 20px;
        }
        .btn-guest {
            background: none;
            color: #999;
            font-weight: 400;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .btn-guest:hover {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-icon">🌤</div>
        <h1 class="login-title">WeatherCal</h1>
        <p class="login-subtitle">날씨 맞춤 캘린더</p>
        <div class="login-buttons">
            <a href="/api/auth/google/login" class="login-btn btn-google">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google로 시작하기
            </a>
            <a href="/api/auth/kakao/login" class="login-btn btn-kakao">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 3C6.48 3 2 6.36 2 10.5c0 2.67 1.74 5.01 4.35 6.35l-1.1 4.07c-.1.35.3.63.6.43l4.75-3.18c.46.05.93.08 1.4.08 5.52 0 10-3.36 10-7.5S17.52 3 12 3z" fill="#191919"/></svg>
                카카오로 시작하기
            </a>
            <a href="/?guest=1" class="login-btn btn-guest">둘러보기</a>
        </div>
    </div>
</body>
</html>
